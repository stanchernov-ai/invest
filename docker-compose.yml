version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: boardroom_app
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: boardroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
